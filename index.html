<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultra Craft - V1!</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #87ceeb; position: fixed; touch-action: none; font-family: 'Arial', sans-serif; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { position: absolute; inset: 0; z-index: 10; pointer-events: none; }
        #ui > * { pointer-events: auto; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid white; transform: translate(-50%, -50%); pointer-events: none; mix-blend-mode: difference; }
        
        /* Sensitivity Control */
        #settings-box { 
            position: absolute; top: 15px; right: 15px; 
            background: rgba(0,0,0,0.6); color: white; 
            padding: 8px 12px; border-radius: 8px; font-size: 12px;
            display: flex; align-items: center; gap: 10px; border: 1px solid #555;
        }
        #sens-range { cursor: pointer; accent-color: #fff; }

        #hotbar { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
            display: flex; background: rgba(141, 141, 141, 0.8); 
            padding: 4px; border: 4px solid #373737; outline: 2px solid #ffffff;
        }
        .slot { 
            width: 48px; height: 48px; margin: 2px; 
            border: 4px solid #373737; background: #8b8b8b;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 14px; font-weight: bold; text-shadow: 2px 2px #000;
        }
        .slot.active { border-color: #ffffff; background: #9b9b9b; }

        #mobile-root { position: absolute; inset: 0; pointer-events: none; }
        #mobile-root * { pointer-events: auto; }
        #joy-base { 
            position: absolute; bottom: 50px; left: 50px; 
            width: 120px; height: 120px; background: rgba(255,255,255,0.05); 
            border: 3px solid rgba(255,255,255,0.2); border-radius: 50%;
        }
        #joy-knob { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: rgba(255,255,255,0.3); border-radius: 50%; transform: translate(-50%, -50%); }
        .action-btns { position: absolute; bottom: 50px; right: 30px; display: flex; flex-direction: column; gap: 15px; }
        .btn { width: 80px; height: 80px; border-radius: 50%; border: 4px solid rgba(255,255,255,0.6); background: rgba(0,0,0,0.2); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; user-select: none; }
        #jump-btn { width: 70px; height: 70px; align-self: center; background: rgba(255,255,255,0.1); }
        #dig-btn { background: rgba(200,0,0,0.4); } #place-btn { background: rgba(0,200,0,0.4); }
    </style>
</head>
<body>
    <div id="ui">
        <div id="crosshair"></div>
        <div id="settings-box">
            <span>SENS</span>
            <input type="range" id="sens-range" min="1" max="100" value="50">
        </div>
        <div id="hotbar">
            <div class="slot active" onclick="updateSlot(0)">1</div>
            <div class="slot" onclick="updateSlot(1)">2</div>
            <div class="slot" onclick="updateSlot(2)">3</div>
            <div class="slot" onclick="updateSlot(3)">4</div>
        </div>
        <div id="mobile-root">
            <div id="joy-base"><div id="joy-knob"></div></div>
            <div class="action-btns">
                <div class="btn" id="jump-btn">JUMP</div>
                <div style="display:flex; gap:10px;">
                    <div class="btn" id="dig-btn">DIG</div>
                    <div class="btn" id="place-btn">PLACE</div>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.rotation.order = 'YXZ';
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(1);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        function tex(c1, c2) {
            const cv = document.createElement('canvas'); cv.width = 16; cv.height = 16;
            const x = cv.getContext('2d');
            for(let i=0; i<256; i++) { x.fillStyle = Math.random()>0.5?c1:c2; x.fillRect(i%16, (i/16)|0, 1, 1); }
            const t = new THREE.CanvasTexture(cv); t.magFilter = THREE.NearestFilter; return t;
        }
        const mats = [
            new THREE.MeshLambertMaterial({map: tex('#5a8e4a','#4e7a40')}),
            new THREE.MeshLambertMaterial({map: tex('#866043','#6d4e36')}),
            new THREE.MeshLambertMaterial({map: tex('#7d7d7d','#6a6a6a')}),
            new THREE.MeshLambertMaterial({map: tex('#6b5232','#544027')})
        ];

        const blocks = [];
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        const CHUNK = 10;
        const chunks = new Map();

        function spawn(cx, cz) {
            const key = `${cx},${cz}`;
            if (chunks.has(key)) return;
            const g = new THREE.Group();
            for(let x=0; x<CHUNK; x++) {
                for(let z=0; z<CHUNK; z++) {
                    const wx = cx*CHUNK + x, wz = cz*CHUNK + z;
                    const h = Math.floor(Math.sin(wx*0.15)*2 + Math.cos(wz*0.15)*2) + 5;
                    const b = new THREE.Mesh(boxGeo, mats[0]);
                    b.position.set(wx, h, wz);
                    g.add(b); blocks.push(b);
                    const bed = new THREE.Mesh(boxGeo, mats[2]);
                    bed.position.set(wx, 0, wz);
                    g.add(bed); blocks.push(bed);
                }
            }
            scene.add(g); chunks.set(key, g);
        }

        // --- LOOK SENSITIVITY ---
        let baseSens = 0.002;
        const sensSlider = document.getElementById('sens-range');
        sensSlider.oninput = () => { baseSens = sensSlider.value * 0.00004; };

        let move = { x: 0, z: 0 }, velY = 0, onGround = false, activeSlot = 0, isPC = false;
        const keys = {};

        // Look Logic
        let lastTouch = null;
        window.addEventListener('touchmove', (e) => {
            const touch = Array.from(e.touches).find(t => t.clientX > window.innerWidth/2 || t.clientY < window.innerHeight/2);
            if (!touch) { lastTouch = null; return; }
            if (lastTouch) {
                camera.rotation.y -= (touch.clientX - lastTouch.x) * baseSens * 2;
                camera.rotation.x -= (touch.clientY - lastTouch.y) * baseSens * 2;
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
            }
            lastTouch = { x: touch.clientX, y: touch.clientY };
        }, {passive: false});

        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                camera.rotation.y -= e.movementX * baseSens;
                camera.rotation.x -= e.movementY * baseSens;
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
            }
        });

        // Other Controls
        window.addEventListener('keydown', (e) => { 
            if(!isPC) { isPC = true; document.getElementById('mobile-root').style.display = 'none'; document.body.requestPointerLock(); }
            keys[e.code] = true;
            if(e.code === 'Space' && onGround) velY = 0.25;
            if(e.key >= 1 && e.key <= 4) updateSlot(parseInt(e.key)-1);
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);
        window.addEventListener('mousedown', (e) => { if(isPC) performAction(e.button === 2); });

        const joyKnob = document.getElementById('joy-knob');
        const joyBase = document.getElementById('joy-base');
        joyBase.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const t = e.touches[0]; const rect = joyBase.getBoundingClientRect();
            const dx = t.clientX - (rect.left + rect.width/2), dy = t.clientY - (rect.top + rect.height/2);
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50); const angle = Math.atan2(dy, dx);
            joyKnob.style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px))`;
            move.x = (Math.cos(angle) * dist) / 50; move.z = (Math.sin(angle) * dist) / 50;
        }, {passive: false});
        joyBase.addEventListener('touchend', () => { move.x = 0; move.z = 0; joyKnob.style.transform = 'translate(-50%, -50%)'; });

        document.getElementById('dig-btn').addEventListener('touchstart', (e) => { e.preventDefault(); performAction(false); });
        document.getElementById('place-btn').addEventListener('touchstart', (e) => { e.preventDefault(); performAction(true); });
        document.getElementById('jump-btn').addEventListener('touchstart', (e) => { e.preventDefault(); if(onGround) velY = 0.25; });

        const ray = new THREE.Raycaster();
        function performAction(isPlace) {
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(blocks);
            if(hits.length > 0 && hits[0].distance < 5) {
                if(isPlace) {
                    const pos = hits[0].object.position.clone().add(hits[0].face.normal);
                    const b = new THREE.Mesh(boxGeo, mats[activeSlot]);
                    b.position.copy(pos); scene.add(b); blocks.push(b);
                } else {
                    if(hits[0].object.position.y === 0) return;
                    scene.remove(hits[0].object); blocks.splice(blocks.indexOf(hits[0].object), 1);
                }
            }
        }

        window.updateSlot = function(index) {
            activeSlot = index;
            document.querySelectorAll('.slot').forEach((s, i) => s.classList.toggle('active', i === index));
        };

        camera.position.set(0, 10, 0);
        function loop() {
            requestAnimationFrame(loop);
            const cx = Math.floor(camera.position.x / CHUNK), cz = Math.floor(camera.position.z / CHUNK);
            for(let x=cx-1; x<=cx+1; x++) for(let z=cz-1; z<=cz+1; z++) spawn(x, z);
            if(isPC) {
                if(keys['KeyW']) camera.translateZ(-0.15); if(keys['KeyS']) camera.translateZ(0.15);
                if(keys['KeyA']) camera.translateX(-0.15); if(keys['KeyD']) camera.translateX(0.15);
            } else {
                camera.translateX(move.x * 0.15); camera.translateZ(move.z * 0.15);
            }
            velY -= 0.018; camera.position.y += velY;
            const pRay = new THREE.Raycaster(camera.position, new THREE.Vector3(0,-1,0));
            const ground = pRay.intersectObjects(blocks);
            if(ground.length > 0 && ground[0].distance < 1.75) {
                if(velY < 0) { camera.position.y += (1.75 - ground[0].distance); velY = 0; onGround = true; }
            } else { onGround = false; }
            renderer.render(scene, camera);
        }
        loop();
        window.oncontextmenu = (e) => e.preventDefault();
    </script>
</body>
</html>
